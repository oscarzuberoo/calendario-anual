<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planificador Zaragoza 2026 + Agenda Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333;
            --border-color: #d0d0d0;
            --hover-bg: #f0f8ff;
            --today-bg: #e3f2fd;
            --today-border: #2196f3;
            --has-note-color: #ff9800;

            --c-default: #ffffff;
            --c-festivo: #ffcdd2;
            --c-viaje: #c8e6c9;
            --c-personal: #bbdefb;
            --c-trabajo: #fff9c4;
            --c-auto-holiday: #ffebee;
            --t-auto-holiday: #c62828;

            --primary: #2196f3;
            --primary-dark: #1976d2;
            --success: #2e7d32;
            --warning: #ef6c00;
            --danger: #c62828;

            --todo-bg: #ffffff;
            --todo-soft: #f7f9fc;
            --todo-border: #e5eaf0;
            --todo-shadow: 0 20px 50px rgba(0,0,0,0.16);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            height: 100%;
            background: var(--bg-color);
            color: var(--text-color);
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 0 20px;
            background: #f8f9fa;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            flex-shrink: 0;
            z-index: 5;
        }

        .header-left h1 {
            margin: 0;
            font-size: 1.4rem;
            color: #444;
        }

        .stats-panel {
            display: flex;
            gap: 15px;
            text-align: right;
            font-size: 0.85rem;
            align-items: center;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2196f3;
        }

        #clear-btn {
            background: #ff5252;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            font-size: 0.75rem;
            font-weight: 700;
        }

        #calendar-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            width: 100%;
            height: calc(100vh - 61px);
            overflow-y: auto;
            border-left: 1px solid var(--border-color);
            background: #fff;
        }

        .day-box {
            position: relative;
            background-color: var(--c-default);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            min-height: 65px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s ease, transform 0.08s ease;
        }

        .day-box:hover {
            background-color: var(--hover-bg);
        }

        .selected-block {
            outline: 4px solid #2196f3 !important;
            outline-offset: -4px;
            z-index: 10;
            background-color: #e3f2fd !important;
        }

        .month-label {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            color: rgba(0,0,0,0.4);
        }

        .day-number {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .weekday-label {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: rgba(0,0,0,0.5);
        }

        .is-official-holiday .weekday-label {
            bottom: 18px;
            font-size: 0.65rem;
        }

        .is-official-holiday {
            background-color: var(--c-auto-holiday);
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.7) 10px,
                rgba(255,255,255,0.7) 20px
            );
        }

        .holiday-name {
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 100%;
            font-size: 0.55rem;
            color: var(--t-auto-holiday);
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .is-today {
            box-shadow: inset 0 0 0 3px var(--today-border) !important;
        }

        .note-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background-color: var(--has-note-color);
            border-radius: 50%;
            display: none;
        }

        .has-note .note-indicator {
            display: block;
        }

        .bg-festivo { background-color: var(--c-festivo) !important; }
        .bg-viaje { background-color: var(--c-viaje) !important; }
        .bg-personal { background-color: var(--c-personal) !important; }
        .bg-trabajo { background-color: var(--c-trabajo) !important; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 430px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 18px 40px rgba(0,0,0,0.18);
        }

        .color-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .color-dot.selected {
            border-color: #333;
            transform: scale(1.15);
        }

        #noteText {
            width: 100%;
            height: 88px;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: none;
            font-family: inherit;
        }

        .agenda-toggle {
            background: #f1f3f4;
            border: 1px solid #ccc;
            padding: 8px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
        }

        #hourly-container {
            display: none;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            margin-bottom: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
            flex-grow: 1;
        }

        .hour-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hour-label {
            width: 50px;
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
        }

        .hour-input {
            flex-grow: 1;
            padding: 5px;
            border: 1px solid #eee;
            border-radius: 3px;
            font-family: inherit;
        }

        .modal-buttons {
            margin-top: auto;
            padding-top: 10px;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            font-family: inherit;
        }

        .btn-save {
            background: #2196f3;
            color: white;
            float: right;
        }

        .btn-cancel {
            background: #ddd;
            color: #333;
            float: right;
            margin-right: 10px;
        }

        /* TODO DRAWER */
        #todo-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.22);
            z-index: 120;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
        }

        #todo-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        #todo-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 420px;
            max-width: 92vw;
            height: 100vh;
            background: var(--todo-bg);
            box-shadow: var(--todo-shadow);
            z-index: 130;
            transform: translateX(calc(100% - 54px));
            transition: transform 0.28s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--todo-border);
        }

        #todo-drawer.open {
            transform: translateX(0);
        }

        #todo-tab {
            position: absolute;
            left: -46px;
            top: 110px;
            width: 46px;
            height: 150px;
            background: var(--primary);
            color: white;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(33,150,243,0.32);
            user-select: none;
        }

        #todo-tab:hover {
            background: var(--primary-dark);
        }

        .todo-header {
            padding: 18px 18px 14px 18px;
            border-bottom: 1px solid var(--todo-border);
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .todo-header-left h3 {
            margin: 0;
            font-size: 1.15rem;
            color: #1f2937;
        }

        .todo-header-left p {
            margin: 4px 0 0;
            font-size: 0.86rem;
            color: #6b7280;
        }

        .todo-close-btn {
            background: #eef3f8;
            color: #334155;
            border-radius: 10px;
            min-width: 40px;
            height: 40px;
            padding: 0;
            font-size: 20px;
        }

        .todo-section {
            padding: 14px 18px;
            border-bottom: 1px solid var(--todo-border);
        }

        .todo-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--todo-soft);
        }

        .todo-form input,
        .todo-form textarea,
        .todo-form select {
            width: 100%;
            border: 1px solid #d9e1ea;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.92rem;
            font-family: inherit;
            outline: none;
            background: white;
        }

        .todo-form input:focus,
        .todo-form textarea:focus,
        .todo-form select:focus,
        #todoSearch:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(33,150,243,0.10);
        }

        .todo-form textarea {
            min-height: 78px;
            resize: vertical;
        }

        .todo-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .todo-add-btn {
            background: var(--primary);
            color: white;
            border-radius: 10px;
        }

        .todo-add-btn:hover {
            background: var(--primary-dark);
        }

        .todo-tools {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fff;
        }

        #todoSearch {
            width: 100%;
            border: 1px solid #d9e1ea;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.92rem;
            font-family: inherit;
            outline: none;
        }

        .todo-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .todo-filter {
            background: #eef4fb;
            color: #334155;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .todo-filter.active {
            background: var(--primary);
            color: white;
        }

        .todo-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .todo-summary {
            font-size: 0.84rem;
            color: #64748b;
            font-weight: 700;
        }

        .todo-clear-done {
            background: #fff1f2;
            color: #c62828;
            border-radius: 10px;
            font-size: 0.78rem;
            padding: 7px 10px;
        }

        .todo-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-empty {
            background: white;
            border: 1px solid var(--todo-border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            color: #64748b;
            font-size: 0.92rem;
        }

        .todo-card {
            background: white;
            border: 1px solid var(--todo-border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-card.done {
            opacity: 0.78;
            background: #f8fff8;
        }

        .todo-card.overdue:not(.done) {
            border-color: #ffd0d0;
            background: #fff9f9;
        }

        .todo-card-top {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .todo-check {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .todo-main {
            flex: 1;
            min-width: 0;
        }

        .todo-title {
            font-size: 0.98rem;
            font-weight: 800;
            color: #1f2937;
            line-height: 1.35;
            word-break: break-word;
        }

        .todo-card.done .todo-title {
            text-decoration: line-through;
            color: #6b7280;
        }

        .todo-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .todo-chip {
            font-size: 0.74rem;
            font-weight: 800;
            border-radius: 999px;
            padding: 5px 9px;
            background: #eef4fb;
            color: #355070;
        }

        .todo-chip.date {
            background: #e8f1ff;
            color: #1d4ed8;
        }

        .todo-chip.pending {
            background: #fff4e5;
            color: #b26a00;
        }

        .todo-chip.done {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .todo-chip.p-low {
            background: #f1f5f9;
            color: #475569;
        }

        .todo-chip.p-medium {
            background: #fff7ed;
            color: #c2410c;
        }

        .todo-chip.p-high {
            background: #fee2e2;
            color: #b91c1c;
        }

        .todo-comments {
            font-size: 0.88rem;
            color: #4b5563;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
            padding-left: 28px;
        }

        .todo-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding-left: 28px;
        }

        .todo-edit-btn {
            background: #eef4fb;
            color: #1d4ed8;
            border-radius: 9px;
            padding: 7px 10px;
            font-size: 0.8rem;
        }

        .todo-delete-btn {
            background: #ffebee;
            color: #c62828;
            border-radius: 9px;
            padding: 7px 10px;
            font-size: 0.8rem;
        }

        @media (max-width: 700px) {
            header {
                padding: 0 12px;
            }

            .stats-panel {
                gap: 10px;
            }

            #todo-drawer {
                width: 100%;
                max-width: 100%;
                transform: translateX(calc(100% - 48px));
            }

            #todo-tab {
                left: -40px;
                width: 40px;
            }

            .todo-grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1 id="year-header">2026</h1>
            <span id="selection-info" style="color: #2196f3; font-weight: bold; font-size: 0.9rem;"></span>
        </div>
        <div class="stats-panel">
            <div id="clear-btn" onclick="limpiarSeleccionVisual()">Limpiar Selección</div>
            <div class="stat-box">
                <span class="stat-value" id="progress-percent">0%</span>
                <span class="stat-label">Completado</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="red-counter-val">0</span>
                <span class="stat-label">Festivos</span>
            </div>
        </div>
    </header>

    <div id="calendar-container"></div>

    <div id="todo-overlay"></div>

    <aside id="todo-drawer">
        <div id="todo-tab">TO DO</div>

        <div class="todo-header">
            <div class="todo-header-left">
                <h3>Panel de productividad</h3>
                <p>Tareas con fecha, comentarios, prioridad y filtros</p>
            </div>
            <button class="todo-close-btn" id="todo-close-btn" title="Cerrar">×</button>
        </div>

        <div class="todo-section todo-form">
            <input type="hidden" id="todoEditId" />

            <input type="text" id="todoTitle" placeholder="Título de la tarea" />

            <div class="todo-grid-2">
                <input type="date" id="todoDate" />
                <select id="todoPriority">
                    <option value="low">Prioridad baja</option>
                    <option value="medium" selected>Prioridad media</option>
                    <option value="high">Prioridad alta</option>
                </select>
            </div>

            <div class="todo-grid-2">
                <select id="todoStatus">
                    <option value="pending" selected>Pendiente</option>
                    <option value="done">Hecha</option>
                </select>
                <input type="text" id="todoTag" placeholder="Etiqueta opcional (ej. Trabajo)" />
            </div>

            <textarea id="todoComments" placeholder="Comentarios, notas, pasos siguientes, recordatorios..."></textarea>

            <button class="todo-add-btn" id="addTodoBtn">Guardar tarea</button>
        </div>

        <div class="todo-section todo-tools">
            <input type="text" id="todoSearch" placeholder="Buscar tarea o comentario..." />

            <div class="todo-filters">
                <button class="todo-filter active" data-filter="all">Todas</button>
                <button class="todo-filter" data-filter="pending">Pendientes</button>
                <button class="todo-filter" data-filter="done">Hechas</button>
                <button class="todo-filter" data-filter="today">Hoy</button>
                <button class="todo-filter" data-filter="upcoming">Próximas</button>
            </div>

            <div class="todo-meta-row">
                <span class="todo-summary" id="todoSummary">0 pendientes</span>
                <button class="todo-clear-done" id="clearDoneBtn">Borrar hechas</button>
            </div>
        </div>

        <div class="todo-list" id="todoList"></div>
    </aside>

    <div class="modal-overlay" id="noteModal">
        <div class="modal-box">
            <h3 id="modalTitle" style="margin-top:0; text-align:center;">Editar</h3>

            <div class="color-selector">
                <div class="color-dot" style="background: var(--c-default);" onclick="selectColor('default')">X</div>
                <div class="color-dot" style="background: var(--c-festivo);" onclick="selectColor('festivo')"></div>
                <div class="color-dot" style="background: var(--c-viaje);" onclick="selectColor('viaje')"></div>
                <div class="color-dot" style="background: var(--c-personal);" onclick="selectColor('personal')"></div>
                <div class="color-dot" style="background: var(--c-trabajo);" onclick="selectColor('trabajo')"></div>
            </div>

            <textarea id="noteText" placeholder="Escribe algo para todos los días seleccionados..."></textarea>

            <button class="agenda-toggle" onclick="toggleSchedule()">
                <span>🕒 Agenda Detallada</span>
                <span id="arrow-icon">▼</span>
            </button>

            <div id="hourly-container"></div>

            <div class="modal-buttons">
                <button class="btn-save" id="btnGuardar">Guardar en Nube</button>
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

        let todoSearchQuery = '';

        const hoursList = [
            "06:00", "07:00", "08:00", "09:00", "10:00", "11:00",
            "12:00", "13:00", "14:00", "15:00", "16:00", "17:00",
            "18:00", "19:00", "20:00", "21:00", "22:00", "23:00", "00:00"
        ];

        const holidays2026 = {
            "0-1":"Año Nuevo",
            "0-6":"Reyes",
            "0-29":"San Valero",
            "2-5":"Cincomarzada",
            "3-2":"Jueves Santo",
            "3-3":"Viernes Santo",
            "3-23":"San Jorge",
            "4-1":"Día del Trabajo",
            "7-15":"Asunción",
            "9-12":"El Pilar",
            "10-1":"Todos los Santos",
            "11-6":"Constitución",
            "11-8":"Inmaculada",
            "11-25":"Navidad"
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Shift') isShiftPressed = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'Shift') isShiftPressed = false;
        });

        async function init() {
            generateHourlyInputs();
            await cargarDatosDesdeNube();
            generarCalendario();
            updateStats();
            initTodo();
        }

        async function cargarDatosDesdeNube() {
            try {
                const { data, error } = await _supabase.from('Calendario').select('*');
                if (error) {
                    console.error(error);
                    return;
                }
                if (data) {
                    data.forEach(row => {
                        try {
                            eventsData[row.fecha] = JSON.parse(row.otros);
                        } catch (e) {
                            console.error('Error parseando datos de fecha:', row, e);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        function generarCalendario() {
            container.innerHTML = '';

            for (let m = 0; m < 12; m++) {
                const daysInMonth = new Date(currentYear, m + 1, 0).getDate();

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateId = `${currentYear}-${m}-${d}`;
                    const dateObj = new Date(currentYear, m, d);
                    const cell = document.createElement('div');
                    cell.className = 'day-box';
                    cell.id = dateId;

                    if (holidays2026[`${m}-${d}`]) {
                        cell.classList.add('is-official-holiday');
                        cell.innerHTML += `<span class="holiday-name">${holidays2026[`${m}-${d}`]}</span>`;
                    }

                    const data = eventsData[dateId] || { color: 'default', text: '', schedule: {} };

                    if (data.color && data.color !== 'default') {
                        cell.classList.add(`bg-${data.color}`);
                    }

                    if (data.text || (data.schedule && Object.keys(data.schedule).length > 0)) {
                        cell.classList.add('has-note');
                    }

                    const now = new Date();
                    if (
                        d === now.getDate() &&
                        m === now.getMonth() &&
                        currentYear === now.getFullYear()
                    ) {
                        cell.classList.add('is-today');
                    }

                    cell.innerHTML += `
                        <span class="month-label">${monthsFull[m].substring(0,2).toUpperCase()}</span>
                        <span class="day-number">${d}</span>
                        <span class="weekday-label">${weekdaysFull[dateObj.getDay()]}</span>
                        <span class="note-indicator"></span>
                    `;

                    cell.onclick = (e) => manejarClic(e, dateId, d, monthsFull[m]);
                    container.appendChild(cell);
                }
            }
        }

        function manejarClic(e, id, d, m) {
            const el = document.getElementById(id);

            if (isShiftPressed) {
                if (selectedDays.includes(id)) {
                    selectedDays = selectedDays.filter(item => item !== id);
                    el.classList.remove('selected-block');
                } else {
                    selectedDays.push(id);
                    el.classList.add('selected-block');
                }
                actualizarUISeleccion();
            } else {
                if (!selectedDays.includes(id)) {
                    limpiarSeleccionVisual();
                    selectedDays = [id];
                    el.classList.add('selected-block');
                }
                openModal(id, d, m);
            }
        }

        function actualizarUISeleccion() {
            const info = document.getElementById('selection-info');
            const btn = document.getElementById('clear-btn');

            if (selectedDays.length > 1) {
                info.innerText = `Seleccionados: ${selectedDays.length} días`;
                btn.style.display = 'block';
            } else {
                info.innerText = '';
                btn.style.display = 'none';
            }
        }

        function limpiarSeleccionVisual() {
            selectedDays.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('selected-block');
            });
            selectedDays = [];
            actualizarUISeleccion();
        }

        function generateHourlyInputs() {
            const cont = document.getElementById('hourly-container');
            cont.innerHTML = '';
            hoursList.forEach(h => {
                cont.innerHTML += `
                    <div class="hour-row">
                        <div class="hour-label">${h}</div>
                        <input type="text" class="hour-input" data-hour="${h}">
                    </div>
                `;
            });
        }

        function openModal(id, day, month) {
            const isMultiple = selectedDays.length > 1;
            document.getElementById('modalTitle').innerText =
                isMultiple ? `Editando ${selectedDays.length} días` : `${day} de ${month}`;

            const data = isMultiple
                ? { text: '', color: 'default', schedule: {} }
                : (eventsData[id] || { text: '', color: 'default', schedule: {} });

            document.getElementById('noteText').value = data.text || '';
            selectColor(data.color || 'default');

            document.querySelectorAll('.hour-input').forEach(inp => {
                inp.value = (data.schedule && data.schedule[inp.dataset.hour]) ? data.schedule[inp.dataset.hour] : '';
            });

            document.getElementById('noteModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('noteModal').style.display = 'none';
            limpiarSeleccionVisual();
        }

        async function saveData() {
            const btn = document.getElementById('btnGuardar');
            btn.innerText = 'Guardando...';
            btn.disabled = true;

            const scheduleObj = {};
            document.querySelectorAll('.hour-input').forEach(inp => {
                if (inp.value.trim()) {
                    scheduleObj[inp.dataset.hour] = inp.value.trim();
                }
            });

            const dataObj = {
                text: document.getElementById('noteText').value.trim(),
                color: selectedColor,
                schedule: scheduleObj
            };

            try {
                for (const dayId of selectedDays) {
                    await _supabase.from('Calendario').delete().eq('fecha', dayId);

                    if (dataObj.text || dataObj.color !== 'default' || Object.keys(scheduleObj).length > 0) {
                        await _supabase.from('Calendario').insert([
                            { fecha: dayId, otros: JSON.stringify(dataObj) }
                        ]);
                        eventsData[dayId] = dataObj;
                    } else {
                        delete eventsData[dayId];
                    }
                }

                generarCalendario();
                updateStats();
                closeModal();
            } catch (err) {
                console.error(err);
                alert('Ha ocurrido un error al guardar.');
            } finally {
                btn.innerText = 'Guardar en Nube';
                btn.disabled = false;
            }
        }

        document.getElementById('btnGuardar').onclick = saveData;

        function selectColor(c) {
            selectedColor = c;
            document.querySelectorAll('.color-dot').forEach(d => {
                const onclickAttr = d.getAttribute('onclick') || '';
                d.classList.toggle('selected', onclickAttr.includes(`'${c}'`));
            });
        }

        function toggleSchedule() {
            const c = document.getElementById('hourly-container');
            const a = document.getElementById('arrow-icon');
            const isVisible = c.style.display === 'flex';
            c.style.display = isVisible ? 'none' : 'flex';
            a.innerText = isVisible ? '▼' : '▲';
        }

        function updateStats() {
            const totalDays = 365;
            const today = new Date();
            const start = new Date(currentYear, 0, 1);
            let dayOfYear = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
            dayOfYear = Math.max(0, Math.min(365, dayOfYear));

            document.getElementById('progress-percent').innerText =
                `${((dayOfYear / totalDays) * 100).toFixed(1)}%`;

            document.getElementById('red-counter-val').innerText = Object.keys(holidays2026).length;
        }

        /* TODO */
        function initTodo() {
            const drawer = document.getElementById('todo-drawer');
            const overlay = document.getElementById('todo-overlay');
            const tab = document.getElementById('todo-tab');
            const closeBtn = document.getElementById('todo-close-btn');

            tab.addEventListener('click', openTodoDrawer);
            closeBtn.addEventListener('click', closeTodoDrawer);
            overlay.addEventListener('click', closeTodoDrawer);

            document.getElementById('addTodoBtn').addEventListener('click', saveTodoFromForm);
            document.getElementById('clearDoneBtn').addEventListener('click', clearDoneTodos);
            document.getElementById('todoSearch').addEventListener('input', (e) => {
                todoSearchQuery = e.target.value.trim().toLowerCase();
                renderTodos();
            });

            document.getElementById('todoTitle').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') saveTodoFromForm();
            });

            document.querySelectorAll('.todo-filter').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentTodoFilter = btn.dataset.filter;
                    document.querySelectorAll('.todo-filter').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderTodos();
                });
            });

            renderTodos();

            function openTodoDrawer() {
                drawer.classList.add('open');
                overlay.classList.add('open');
            }

            function closeTodoDrawer() {
                drawer.classList.remove('open');
                overlay.classList.remove('open');
            }

            window.openTodoDrawer = openTodoDrawer;
            window.closeTodoDrawer = closeTodoDrawer;
        }

        function saveTodos() {
            localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(todos));
        }

        function resetTodoForm() {
            document.getElementById('todoEditId').value = '';
            document.getElementById('todoTitle').value = '';
            document.getElementById('todoDate').value = '';
            document.getElementById('todoPriority').value = 'medium';
            document.getElementById('todoStatus').value = 'pending';
            document.getElementById('todoTag').value = '';
            document.getElementById('todoComments').value = '';
            document.getElementById('addTodoBtn').innerText = 'Guardar tarea';
        }

        function saveTodoFromForm() {
            const editId = document.getElementById('todoEditId').value;
            const title = document.getElementById('todoTitle').value.trim();
            const date = document.getElementById('todoDate').value;
            const priority = document.getElementById('todoPriority').value;
            const status = document.getElementById('todoStatus').value;
            const tag = document.getElementById('todoTag').value.trim();
            const comments = document.getElementById('todoComments').value.trim();

            if (!title) return;

            const todoObj = {
                id: editId ? Number(editId) : Date.now(),
                title,
                date,
                priority,
                done: status === 'done',
                tag,
                comments,
                createdAt: editId ? (todos.find(t => t.id === Number(editId))?.createdAt || Date.now()) : Date.now()
            };

            if (editId) {
                todos = todos.map(t => t.id === Number(editId) ? todoObj : t);
            } else {
                todos.unshift(todoObj);
            }

            saveTodos();
            resetTodoForm();
            renderTodos();
            if (window.openTodoDrawer) window.openTodoDrawer();
        }

        function editTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            document.getElementById('todoEditId').value = todo.id;
            document.getElementById('todoTitle').value = todo.title || '';
            document.getElementById('todoDate').value = todo.date || '';
            document.getElementById('todoPriority').value = todo.priority || 'medium';
            document.getElementById('todoStatus').value = todo.done ? 'done' : 'pending';
            document.getElementById('todoTag').value = todo.tag || '';
            document.getElementById('todoComments').value = todo.comments || '';
            document.getElementById('addTodoBtn').innerText = 'Actualizar tarea';

            if (window.openTodoDrawer) window.openTodoDrawer();
        }

        function toggleTodo(id) {
            todos = todos.map(todo =>
                todo.id === id ? { ...todo, done: !todo.done } : todo
            );
            saveTodos();
            renderTodos();
        }

        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveTodos();
            renderTodos();
        }

        function clearDoneTodos() {
            todos = todos.filter(todo => !todo.done);
            saveTodos();
            renderTodos();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function formatDateDisplay(value) {
            if (!value) return '';
            const parts = value.split('-');
            if (parts.length !== 3) return value;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        function isTodayDate(value) {
            if (!value) return false;
            const now = new Date();
            const todayStr = [
                now.getFullYear(),
                String(now.getMonth() + 1).padStart(2, '0'),
                String(now.getDate()).padStart(2, '0')
            ].join('-');
            return value === todayStr;
        }

        function isUpcomingDate(value) {
            if (!value) return false;
            const today = new Date();
            today.setHours(0,0,0,0);

            const target = new Date(value + 'T00:00:00');
            if (Number.isNaN(target.getTime())) return false;

            const diff = Math.round((target - today) / (1000 * 60 * 60 * 24));
            return diff >= 1 && diff <= 7;
        }

        function isOverdue(value, done) {
            if (!value || done) return false;
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(value + 'T00:00:00');
            if (Number.isNaN(target.getTime())) return false;
            return target < today;
        }

        function getFilteredTodos() {
            let filtered = [...todos];

            if (currentTodoFilter === 'pending') {
                filtered = filtered.filter(t => !t.done);
            } else if (currentTodoFilter === 'done') {
                filtered = filtered.filter(t => t.done);
            } else if (currentTodoFilter === 'today') {
                filtered = filtered.filter(t => isTodayDate(t.date));
            } else if (currentTodoFilter === 'upcoming') {
                filtered = filtered.filter(t => isUpcomingDate(t.date));
            }

            if (todoSearchQuery) {
                filtered = filtered.filter(t => {
                    const haystack = [
                        t.title || '',
                        t.comments || '',
                        t.tag || ''
                    ].join(' ').toLowerCase();
                    return haystack.includes(todoSearchQuery);
                });
            }

            filtered.sort((a, b) => {
                if (a.done !== b.done) return a.done - b.done;

                const priorityOrder = { high: 0, medium: 1, low: 2 };
                const pa = priorityOrder[a.priority || 'medium'];
                const pb = priorityOrder[b.priority || 'medium'];
                if (pa !== pb) return pa - pb;

                if (a.date && b.date) return a.date.localeCompare(b.date);
                if (a.date) return -1;
                if (b.date) return 1;

                return (b.createdAt || 0) - (a.createdAt || 0);
            });

            return filtered;
        }

        function updateTodoSummary() {
            const pending = todos.filter(t => !t.done).length;
            const total = todos.length;
            document.getElementById('todoSummary').textContent = `${pending} pendientes · ${total} total`;
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            const filtered = getFilteredTodos();

            list.innerHTML = '';

            if (!filtered.length) {
                list.innerHTML = `<div class="todo-empty">No hay tareas en esta vista</div>`;
                updateTodoSummary();
                return;
            }

            filtered.forEach(todo => {
                const overdue = isOverdue(todo.date, todo.done);
                const priorityLabel =
                    todo.priority === 'high' ? 'Alta' :
                    todo.priority === 'low' ? 'Baja' : 'Media';

                const card = document.createElement('div');
                card.className = `todo-card ${todo.done ? 'done' : ''} ${overdue ? 'overdue' : ''}`;

                card.innerHTML = `
                    <div class="todo-card-top">
                        <input class="todo-check" type="checkbox" ${todo.done ? 'checked' : ''}>
                        <div class="todo-main">
                            <div class="todo-title">${escapeHtml(todo.title)}</div>
                            <div class="todo-meta">
                                ${todo.date ? `<span class="todo-chip date">${overdue ? 'Atrasada · ' : ''}${escapeHtml(formatDateDisplay(todo.date))}</span>` : ''}
                                <span class="todo-chip ${todo.done ? 'done' : 'pending'}">${todo.done ? 'Hecha' : 'Pendiente'}</span>
                                <span class="todo-chip p-${escapeHtml(todo.priority || 'medium')}">Prioridad ${priorityLabel}</span>
                                ${todo.tag ? `<span class="todo-chip">${escapeHtml(todo.tag)}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    ${todo.comments ? `<div class="todo-comments">${escapeHtml(todo.comments)}</div>` : ''}
                    <div class="todo-footer">
                        <button class="todo-edit-btn">Editar</button>
                        <button class="todo-delete-btn">Eliminar</button>
                    </div>
                `;

                card.querySelector('.todo-check').addEventListener('change', () => toggleTodo(todo.id));
                card.querySelector('.todo-edit-btn').addEventListener('click', () => editTodo(todo.id));
                card.querySelector('.todo-delete-btn').addEventListener('click', () => deleteTodo(todo.id));

                list.appendChild(card);
            });

            updateTodoSummary();
        }

        init();
    </script>
</body>
</html>
